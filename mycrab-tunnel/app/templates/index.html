<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mycrab Tunnel</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

  :root {
    --bg: #0f1117;
    --surface: #1a1f2e;
    --surface2: #232a3b;
    --border: #2a3347;
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --radius: 10px;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 56px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
  .logo svg { color: var(--accent); }

  .pill { display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .pill.running { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
  .pill.idle { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  main { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-val { font-size: 26px; font-weight: 700; line-height: 1.1; }
  .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .toolbar-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s, background .15s; font-family: inherit; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: .88; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,.18); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-green { background: rgba(34,197,94,.1); color: var(--green); border: 1px solid rgba(34,197,94,.2); }
  .btn-green:hover:not(:disabled) { background: rgba(34,197,94,.18); }

  .tunnels { display: flex; flex-direction: column; gap: 10px; }
  .t-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .t-card.running { border-left: 3px solid var(--green); }
  .t-card.stopped { border-left: 3px solid var(--border); }
  .t-card.pending { border-left: 3px solid var(--accent); }
  .t-card.failed  { border-left: 3px solid var(--red); }

  .t-inner { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 14px 18px; align-items: center; }
  .t-name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; }
  .badge-free { background: rgba(59,130,246,.12); color: var(--accent); }
  .badge-paid { background: rgba(245,158,11,.12); color: var(--orange); }
  .badge-running { background: rgba(34,197,94,.12); color: var(--green); }
  .badge-stopped { background: var(--surface2); color: var(--muted); }
  .badge-pending { background: rgba(59,130,246,.12); color: var(--accent); }
  .badge-failed  { background: rgba(239,68,68,.12); color: var(--red); }
  .t-url { font-family: monospace; font-size: 12px; color: var(--accent); margin-bottom: 5px; }
  .t-url a { color: inherit; text-decoration: none; }
  .t-url a:hover { text-decoration: underline; }
  .t-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .t-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .pending-bar { padding: 8px 18px; border-top: 1px solid var(--border); background: rgba(59,130,246,.05); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(59,130,246,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-bar { padding: 8px 18px; border-top: 1px solid rgba(239,68,68,.2); background: rgba(239,68,68,.06); font-size: 11px; color: var(--red); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .error-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .port-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 3px 8px; font-size: 11px; font-family: monospace; width: 72px; outline: none; }
  .port-input:focus { border-color: var(--accent); }

  .empty { text-align: center; padding: 56px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .empty h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .empty p { color: var(--muted); max-width: 320px; margin: 0 auto 20px; line-height: 1.6; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 460px; padding: 26px; transform: translateY(10px); transition: transform .2s; }
  .overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
  input[type=text], input[type=number] { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color .15s; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
  input::placeholder { color: var(--muted); }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .hint a { color: var(--accent); text-decoration: none; }
  .token-wrap { position: relative; }
  .token-wrap input { padding-right: 70px; font-family: monospace; font-size: 12px; }
  .token-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .token-clear:hover { color: var(--red); }
  .port-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
  .port-chip { padding: 3px 9px; border-radius: 5px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; color: var(--muted); font-family: monospace; transition: all .1s; }
  .port-chip:hover { background: rgba(59,130,246,.1); border-color: var(--accent); color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 22px; }
  .modal-actions .btn { flex: 1; justify-content: center; }
  .form-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); border-radius: 8px; padding: 9px 12px; color: var(--red); font-size: 12px; margin-top: 14px; display: none; }

  /* Logs modal */
  .logs-pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: var(--muted); max-height: 360px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 14px; line-height: 1.6; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); padding: 8px 18px; border-radius: 20px; font-size: 13px; transition: transform .25s; z-index: 300; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 560px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .t-inner { grid-template-columns: 1fr; }
    .t-actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    mycrab Tunnel
  </div>
  <div id="hdr-pill" class="pill idle"><span class="dot"></span><span id="hdr-text">Loading…</span></div>
</header>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total" style="color:var(--accent)">—</div><div class="stat-lbl">Tunnels</div></div>
    <div class="stat"><div class="stat-val" id="s-running" style="color:var(--green)">—</div><div class="stat-lbl">Running</div></div>
    <div class="stat"><div class="stat-val" id="s-stopped" style="color:var(--muted)">—</div><div class="stat-lbl">Stopped</div></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-title">Tunnels</div>
    <button class="btn btn-primary" onclick="openCreate()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New tunnel
    </button>
  </div>
  <div class="tunnels" id="list"></div>
</main>

<!-- Create Modal -->
<div class="overlay" id="create-overlay" onclick="if(event.target===this)closeCreate()">
  <div class="modal">
    <h2>New tunnel</h2>
    <p class="modal-sub">Expose any local service via a secure mycrab.space URL — no Cloudflare account needed.</p>

    <div class="form-group">
      <label>Service name</label>
      <input id="m-name" type="text" placeholder="Home Assistant, Frigate, Node-RED…">
    </div>

    <div class="form-group">
      <label>Local port</label>
      <input id="m-port" type="number" value="8123" min="1" max="65535">
      <div class="port-chips">
        <span class="port-chip" onclick="setPort(8123)">8123 HA</span>
        <span class="port-chip" onclick="setPort(1883)">1883 MQTT</span>
        <span class="port-chip" onclick="setPort(8554)">8554 RTSP</span>
        <span class="port-chip" onclick="setPort(5000)">5000</span>
        <span class="port-chip" onclick="setPort(3000)">3000</span>
        <span class="port-chip" onclick="setPort(80)">80</span>
      </div>
    </div>

    <div class="form-group">
      <label>Vanity token <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional — for custom subdomain)</span></label>
      <div class="token-wrap">
        <input id="m-token" type="text" placeholder="Leave empty for a free agent-XXXXXX subdomain">
        <span class="token-clear" onclick="clearToken()" title="Clear">✕ clear</span>
      </div>
      <div class="hint">Get a vanity token at <a href="https://mycrab.space" target="_blank">mycrab.space</a></div>
    </div>

    <div id="form-error" class="form-error"></div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeCreate()">Cancel</button>
      <button class="btn btn-primary" id="btn-create" onclick="submitCreate()">
        <span id="create-label">Create tunnel</span>
        <span id="create-spin" class="spin" style="display:none"></span>
      </button>
    </div>
  </div>
</div>

<!-- Logs Modal -->
<div class="overlay" id="logs-overlay" onclick="if(event.target===this)closeLogs()">
  <div class="modal" style="max-width:620px">
    <h2>Tunnel logs</h2>
    <p class="modal-sub" id="logs-title"></p>
    <pre class="logs-pre" id="logs-pre">Loading…</pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLogs()">Close</button>
      <button class="btn btn-primary btn-sm" onclick="refreshLogs()">Refresh</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let _tunnels = [];
let _pollTimer = null;
let _logsId = null;

const BASE = location.pathname.replace(/\/?$/, '/');

async function api(method, path, body) {
  const url = BASE + path.replace(/^\//, '');
  const r = await fetch(url, {
    method,
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined
  });
  return r.json();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function statusBadge(s) {
  const map = {
    running: '<span class="badge badge-running">running</span>',
    stopped: '<span class="badge badge-stopped">stopped</span>',
    pending: '<span class="badge badge-pending">provisioning…</span>',
    failed:  '<span class="badge badge-failed">failed</span>',
  };
  return map[s] || `<span class="badge badge-stopped">${s}</span>`;
}

function tierBadge(t) {
  return t === 'paid'
    ? '<span class="badge badge-paid">vanity</span>'
    : '<span class="badge badge-free">free</span>';
}

function renderTunnel(t) {
  const s = t.status;
  const isRunning = s === 'running';
  const isPending = s === 'pending';
  const isFailed  = s === 'failed';
  const isStopped = s === 'stopped';

  const urlHtml = t.url
    ? `<div class="t-url"><a href="${t.url}" target="_blank">${t.url}</a></div>`
    : `<div class="t-url" style="color:var(--muted)">—</div>`;

  // Port editor
  const portHtml = `
    <span style="display:inline-flex;align-items:center;gap:4px">
      :<input class="port-input" id="port-${t.id}" value="${t.local_port}" onkeydown="if(event.key==='Enter')savePort('${t.id}')">
      <button class="btn btn-ghost btn-sm" onclick="savePort('${t.id}')">save</button>
    </span>`;

  const startStopBtn = isPending ? '' : isRunning
    ? `<button class="btn btn-ghost btn-sm" onclick="stopTunnel('${t.id}')">Stop</button>`
    : `<button class="btn btn-green btn-sm" onclick="startTunnel('${t.id}')" ${isFailed ? '' : ''}>Start</button>`;

  const reproBtn = isFailed
    ? `<button class="btn btn-ghost btn-sm" onclick="reprovision('${t.id}')">Retry</button>`
    : '';

  const logsBtn = `<button class="btn btn-ghost btn-sm" onclick="showLogs('${t.id}','${t.name}')">Logs</button>`;

  const deleteBtn = isPending ? '' :
    `<button class="btn btn-danger btn-sm" onclick="deleteTunnel('${t.id}','${t.name}')">Delete</button>`;

  let bottomBar = '';
  if (isPending) {
    bottomBar = `<div class="pending-bar"><span class="spin"></span> Provisioning — connecting to mycrab API, setting up DNS…</div>`;
  } else if (isFailed) {
    const err = t.error || 'Unknown error';
    bottomBar = `<div class="error-bar">
      <span class="error-text" title="${err}">${err}</span>
    </div>`;
  }

  return `
  <div class="t-card ${s}" id="card-${t.id}">
    <div class="t-inner">
      <div>
        <div class="t-name">
          ${t.name}
          ${tierBadge(t.tier)}
          ${statusBadge(s)}
        </div>
        ${urlHtml}
        <div class="t-meta">
          <span>port ${portHtml}</span>
          ${t.subdomain ? `<span style="font-family:monospace">${t.subdomain}.mycrab.space</span>` : ''}
        </div>
      </div>
      <div class="t-actions">
        ${reproBtn}
        ${startStopBtn}
        ${logsBtn}
        ${deleteBtn}
      </div>
    </div>
    ${bottomBar}
  </div>`;
}

async function loadTunnels() {
  let data;
  try {
    data = await api('GET', '/api/tunnels');
  } catch(e) {
    document.getElementById('list').innerHTML = `<div class="empty"><h3>Connection error</h3><p style="color:var(--red);font-family:monospace;font-size:12px">${e.message}<br>BASE: ${BASE}<br>URL: ${location.href}</p></div>`;
    _pollTimer = setTimeout(loadTunnels, 5000);
    return;
  }
  _tunnels = Array.isArray(data) ? data : [];

  const list = document.getElementById('list');
  if (!_tunnels.length) {
    list.innerHTML = `<div class="empty">
      <h3>No tunnels yet</h3>
      <p>Create your first tunnel to expose a local service via a secure mycrab.space URL.</p>
      <button class="btn btn-primary" onclick="openCreate()">Create tunnel</button>
    </div>`;
  } else {
    list.innerHTML = _tunnels.map(renderTunnel).join('');
  }

  // Header pill
  const running = _tunnels.filter(t => t.status === 'running').length;
  const pending = _tunnels.filter(t => t.status === 'pending').length;
  const pill = document.getElementById('hdr-pill');
  const txt = document.getElementById('hdr-text');
  if (running > 0) {
    pill.className = 'pill running';
    txt.textContent = `${running} running`;
    document.getElementById('hdr-pill').querySelector('.dot').classList.add('pulse');
  } else {
    pill.className = 'pill idle';
    txt.textContent = 'No active tunnels';
  }

  // Stats
  document.getElementById('s-total').textContent = _tunnels.length;
  document.getElementById('s-running').textContent = running;
  document.getElementById('s-stopped').textContent = _tunnels.filter(t => t.status === 'stopped').length;

  // Poll faster when pending tunnels exist
  clearTimeout(_pollTimer);
  _pollTimer = setTimeout(loadTunnels, pending > 0 ? 3000 : 8000);
}

async function startTunnel(id) {
  const r = await api('POST', `/api/tunnels/${id}/start`);
  if (!r.ok) { toast(r.error || 'Failed'); return; }
  toast('Started'); loadTunnels();
}

async function stopTunnel(id) {
  await api('POST', `/api/tunnels/${id}/stop`);
  toast('Stopped'); loadTunnels();
}

async function deleteTunnel(id, name) {
  if (!confirm(`Delete tunnel "${name}"? This cannot be undone.`)) return;
  await api('DELETE', `/api/tunnels/${id}`);
  toast('Deleted'); loadTunnels();
}

async function reprovision(id) {
  const r = await api('POST', `/api/tunnels/${id}/reprovision`);
  if (!r.ok) { toast(r.error || 'Failed'); return; }
  toast('Reprovisioning…'); loadTunnels();
}

async function savePort(id) {
  const val = parseInt(document.getElementById(`port-${id}`).value);
  if (!val || val < 1 || val > 65535) { toast('Invalid port'); return; }
  await api('PATCH', `/api/tunnels/${id}/port`, {local_port: val});
  toast('Port updated'); loadTunnels();
}

function setPort(p) { document.getElementById('m-port').value = p; }
function clearToken() { document.getElementById('m-token').value = ''; }

function openCreate() {
  // Pre-fill default token from HA config
  api('GET', '/api/config').then(c => {
    if (c.default_token) document.getElementById('m-token').value = c.default_token;
  });
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('create-overlay').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 200);
}
function closeCreate() { document.getElementById('create-overlay').classList.remove('open'); }

async function submitCreate() {
  const name = document.getElementById('m-name').value.trim();
  const port = parseInt(document.getElementById('m-port').value) || 8123;
  const token = document.getElementById('m-token').value.trim();
  const btn = document.getElementById('btn-create');
  const lbl = document.getElementById('create-label');
  const spin = document.getElementById('create-spin');
  const errBox = document.getElementById('form-error');

  btn.disabled = true; lbl.textContent = 'Creating…'; spin.style.display = '';
  errBox.style.display = 'none';

  try {
    const r = await api('POST', '/api/tunnels', {name, local_port: port, token});
    if (r.error) { errBox.textContent = r.error; errBox.style.display = 'block'; return; }
    closeCreate();
    toast('Tunnel provisioning started…');
    loadTunnels();
  } catch(e) {
    errBox.textContent = 'Network error'; errBox.style.display = 'block';
  } finally {
    btn.disabled = false; lbl.textContent = 'Create tunnel'; spin.style.display = 'none';
  }
}

async function showLogs(id, name) {
  _logsId = id;
  document.getElementById('logs-title').textContent = name;
  document.getElementById('logs-overlay').classList.add('open');
  await refreshLogs();
}
function closeLogs() { document.getElementById('logs-overlay').classList.remove('open'); _logsId = null; }
async function refreshLogs() {
  if (!_logsId) return;
  const r = await api('GET', `/api/tunnels/${_logsId}/logs`);
  const pre = document.getElementById('logs-pre');
  pre.textContent = (r.lines || []).join('\n') || '(no logs yet)';
  pre.scrollTop = pre.scrollHeight;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCreate(); closeLogs(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCreate(); }
});

loadTunnels();
</script>
</body>
</html>
