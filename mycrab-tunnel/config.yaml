name: mycrab Tunnel
version: "1.0.0"
slug: mycrab_tunnel
description: Expose Home Assistant and local services via mycrab.space tunnels — no port forwarding, no Cloudflare account needed.
url: https://mycrab.space
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:tunnel
panel_title: mycrab Tunnel
homeassistant_api: false
hassio_api: false
hassio_role: default
ports:
  8099/tcp: 8099
options:
  token: ""
  tunnels: []
schema:
  token: str?
  tunnels:
    - name: str
      local_port: int
      subdomain: str
      enabled: bool
